<header>

  <p>¡Feliz tercer cumplemés amor mío!<span class="corazon-latiendo">❤</span></p>
</header>

<main id="mapa">
  <svg id="camino-svg" aria-hidden="true">
    <path class="camino-borde" d=""/>
    <path class="camino-centro" d=""/>
  </svg>
  
</main>

<footer>
  
  <p class="firma">Con mucho amor: Benjamín Alosno Sáez Rojas, 18/7/2026</p>
</footer>

<div id="velo" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
  <div id="modal">
    <button class="cerrar" id="btn-cerrar" aria-label="Cerrar">✕</button>
    <div class="foto-marco">
      <img id="modal-foto" src="" alt="Recuerdo de nuestro camino">
    </div>
    <div class="cuerpo">
      <span class="fecha" id="modal-fecha"></span>
      <h2 id="modal-titulo"></h2>
      <p class="texto" id="modal-texto"></p>
    </div>
    
    <span class="corazon-flotante" style="left:12%;animation-delay:0s">💗</span>
    <span class="corazon-flotante" style="left:50%;animation-delay:1.4s">💕</span>
    <span class="corazon-flotante" style="left:82%;animation-delay:2.6s">💖</span>
  </div>
</div>

<div id="candado">
  <div class="vista" id="vista-cuenta">
    <div class="candado-corazon">💛</div>
    <h2>Se está preparando<br>algo especial para ti…</h2>
    <div id="cuenta">
      <div class="caja"><div class="valor" id="c-dias">–</div><div class="unidad">días</div></div>
      <div class="caja"><div class="valor" id="c-horas">–</div><div class="unidad">horas</div></div>
      <div class="caja"><div class="valor" id="c-min">–</div><div class="unidad">min</div></div>
      <div class="caja"><div class="valor" id="c-seg">–</div><div class="unidad">seg</div></div>
    </div>
    <p class="candado-sub">Vuelve cuando el contador llegue a cero 💛</p>
    <button id="link-llave" type="button">Tengo la llave 🔑</button>
  </div>
  <div class="vista" id="vista-clave" hidden>
    <div class="candado-corazon">🔑</div>
    <h2>Este regalo tiene llave…<br>pídesela a Benja 💛</h2>
    <input type="password" id="clave" placeholder="Pega aquí la llave" autocomplete="off" maxlength="64">
    <button id="btn-entrar" type="button">Entrar 💛</button>
    <p class="candado-error" id="error-clave" hidden></p>
  </div>
</div>
